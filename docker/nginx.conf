server {
    listen 80;
    server_name _;
    root /var/www/aka;
    index index.html;

    # Allow document uploads up to the backend's 50 MB limit (+ headroom).
    client_max_body_size 60m;

    # SPA: static assets, with client-side fallback to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API + Django admin/static -> the Django process in this same container.
    # Same origin, so the HttpOnly auth cookies work with no CORS.
    location ~ ^/(api|admin|static)/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cookie_path / /;
        proxy_read_timeout 120s;
    }
}
