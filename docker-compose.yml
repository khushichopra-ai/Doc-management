services:
  backend:
    build: ./backend
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      QDRANT_HOST: qdrant
    volumes:
      - ./backend/db.sqlite3:/app/db.sqlite3
    networks:
      - default
      - shared_infra

  frontend:
    build: ./frontend
    ports:
      - "3002:80"
    depends_on:
      - backend

networks:
  shared_infra:
    external: true
    name: docker-setups_app_network
