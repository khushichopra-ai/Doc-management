services:
  backend:
    build: ./backend
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      QDRANT_HOST: host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/db.sqlite3:/app/db.sqlite3

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
